# Extension Pulse — Supabase CLI configuration
# For detailed reference: https://supabase.com/docs/guides/local-development/cli/config
#
# This file is used for:
#   - Local development: `supabase start`
#   - Pushing migrations to a linked project: `supabase db push`
#   - Generating types: `supabase gen types typescript`
#
# To deploy to a new instance:
#   supabase link --project-ref <project-ref>
#   supabase db push

project_id = "extension-pulse"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Update this to match NEXT_PUBLIC_APP_URL for the linked project
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# Confirmations are off for magic-link-only flow — users click the link, no OTP needed
enable_confirmations = false
max_frequency = "1s"

[realtime]
enabled = true

[analytics]
enabled = true
port = 54327
backend = "postgres"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2
